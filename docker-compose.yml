services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: realworld
      POSTGRES_USER: realworld
      POSTGRES_PASSWORD: realworld
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realworld -d realworld"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      DATABASE_USER: realworld
      DATABASE_PASSWORD: realworld
      DATABASE_NAME: realworld
      PORT: "3000"
      JWT_SECRET: realworld
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: .
      dockerfile: ./docker/frontend.Dockerfile
      args:
        REACT_APP_API_ROOT: http://localhost:3000/api
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  db_data:
