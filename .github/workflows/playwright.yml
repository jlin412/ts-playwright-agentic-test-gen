name: Playwright Tests (Node)

on:
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: realworld
          POSTGRES_USER: realworld
          POSTGRES_PASSWORD: realworld
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U realworld -d realworld"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      CI: true
      API_URL: http://127.0.0.1:3000
      UI_URL: http://127.0.0.1:4100
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: '5432'
      DATABASE_USER: realworld
      DATABASE_PASSWORD: realworld
      DATABASE_NAME: realworld
      JWT_SECRET: realworld
      PORT: '3000'

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install root test dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start backend
        working-directory: backend
        run: npm run start > ../backend.log 2>&1 &

      - name: Start frontend
        working-directory: frontend
        run: npm start > ../frontend.log 2>&1 &

      - name: Wait for backend and frontend readiness
        shell: bash
        run: |
          set -euo pipefail

          echo "Waiting for backend readiness"
          for i in {1..90}; do
            if curl -fsS "$API_URL/api/tags" > /dev/null; then
              echo "Backend is ready"
              break
            fi

            if [ "$i" -eq 90 ]; then
              echo "Backend did not become ready in time"
              cat backend.log || true
              exit 1
            fi

            sleep 2
          done

          echo "Waiting for frontend readiness"
          for i in {1..90}; do
            if curl -fsS "$UI_URL" > /dev/null; then
              echo "Frontend is ready"
              break
            fi

            if [ "$i" -eq 90 ]; then
              echo "Frontend did not become ready in time"
              cat frontend.log || true
              exit 1
            fi

            sleep 2
          done

      - name: Run Playwright specs
        run: npm test

      - name: Run Playwright BDD specs
        run: npm run test:bdd

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-node
          path: playwright-report/
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results-node
          path: test-results/
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: cucumber-report-node
          path: cucumber-report/
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-logs-node
          path: |
            backend.log
            frontend.log
          retention-days: 30
