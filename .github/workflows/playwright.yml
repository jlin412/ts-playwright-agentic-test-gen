name: Playwright Tests (Node)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: realworld
          POSTGRES_USER: realworld
          POSTGRES_PASSWORD: realworld
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U realworld -d realworld"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      CI: true
      API_URL: http://127.0.0.1:3000
      UI_URL: http://127.0.0.1:4100
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: '5432'
      DATABASE_USER: realworld
      DATABASE_PASSWORD: realworld
      DATABASE_NAME: realworld
      JWT_SECRET: realworld
      PORT: '3000'

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install root test dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Patch frontend submodule
        run: |
          cp assets/main.css frontend/public/main.css
          sed -i 's|//demo.productionready.io/main.css|%PUBLIC_URL%/main.css|' frontend/public/index.html
          sed -i "s|https://conduit.productionready.io/api|${API_URL}/api|" frontend/src/agent.js

      - name: Install Playwright browsers
        run: npx playwright install

      - name: Install system dependencies for Playwright
        run: npx playwright install-deps

      - name: Start backend
        working-directory: backend
        run: npm run start > ../backend.log 2>&1 &

      - name: Start frontend
        working-directory: frontend
        run: npm start > ../frontend.log 2>&1 &

      - name: Wait for backend and frontend readiness
        shell: bash
        run: |
          set -euo pipefail

          echo "Waiting for backend readiness"
          for i in {1..90}; do
            if curl -fsS "$API_URL/api/tags" > /dev/null; then
              echo "Backend is ready"
              break
            fi

            if [ "$i" -eq 90 ]; then
              echo "Backend did not become ready in time"
              cat backend.log || true
              exit 1
            fi

            sleep 2
          done

          echo "Waiting for frontend readiness"
          for i in {1..90}; do
            if curl -fsS "$UI_URL" > /dev/null; then
              echo "Frontend is ready"
              break
            fi

            if [ "$i" -eq 90 ]; then
              echo "Frontend did not become ready in time"
              cat frontend.log || true
              exit 1
            fi

            sleep 2
          done

      - name: Run Playwright specs
        env:
          API_URL: http://127.0.0.1:3000
          UI_URL: http://127.0.0.1:4100
          SMOKE_ONLY: '1'
        run: npm test

      - name: Preserve Playwright spec reports
        if: always()
        run: |
          rm -rf playwright-report-specs test-results-specs
          if [ -d playwright-report ]; then mv playwright-report playwright-report-specs; fi
          if [ -d test-results ]; then mv test-results test-results-specs; fi

      - name: Generate BDD specs
        env:
          API_URL: http://127.0.0.1:3000
          UI_URL: http://127.0.0.1:4100
        run: npm run bddgen

      - name: Run Playwright BDD specs
        env:
          API_URL: http://127.0.0.1:3000
          UI_URL: http://127.0.0.1:4100
          SMOKE_ONLY: '1'
        run: npm run test:bdd

      - name: Preserve Playwright BDD reports
        if: always()
        run: |
          rm -rf playwright-report-bdd test-results-bdd cucumber-report-bdd
          if [ -d playwright-report ]; then mv playwright-report playwright-report-bdd; fi
          if [ -d test-results ]; then mv test-results test-results-bdd; fi
          if [ -d cucumber-report ]; then mv cucumber-report cucumber-report-bdd; fi

      - name: Capture app logs
        if: always()
        run: |
          cp backend.log backend-ci.log || true
          cp frontend.log frontend-ci.log || true

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-specs
          path: playwright-report-specs/
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results-specs
          path: test-results-specs/
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-bdd
          path: playwright-report-bdd/
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results-bdd
          path: test-results-bdd/
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: cucumber-report-bdd
          path: cucumber-report-bdd/
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-logs-node
          path: |
            backend.log
            frontend.log
            backend-ci.log
            frontend-ci.log
          retention-days: 30
